<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-body">

                <h2 class="text-center mb-4">
                    Conversor de Temperatura
                </h2>

                <div class="mb-3">
                    <label for="celsius" class="form-label">
                        Celsius (°C)
                    </label>
                    <input
                        type="number"
                        id="celsius"
                        class="form-control"
                        step="0.1"
                        placeholder="Digite a temperatura em Celsius">
                </div>

                <div class="mb-3">
                    <label for="fahrenheit" class="form-label">
                        Fahrenheit (°F)
                    </label>
                    <input
                        type="number"
                        id="fahrenheit"
                        class="form-control"
                        step="0.1"
                        placeholder="Digite a temperatura em Fahrenheit">
                </div>

            </div>
        </div>
    </div>

    <script>

        const celsius = document.getElementById("celsius");
        const fahrenheit = document.getElementById("fahrenheit");

        celsius.addEventListener("input", function () {

            if (celsius.value === "") {
                fahrenheit.value = "";
                return;
            }

            let c = parseFloat(celsius.value);

            let f = (c * 9 / 5) + 32;

            fahrenheit.value = f.toFixed(2);
        });

        fahrenheit.addEventListener("input", function () {

            if (fahrenheit.value === "") {
                celsius.value = "";
                return;
            }

            let f = parseFloat(fahrenheit.value);

            let c = (f - 32) * 5 / 9;

            celsius.value = c.toFixed(2);
        });

    </script>

</body>
</html>
