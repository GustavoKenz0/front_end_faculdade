<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Bank - Simulador de Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 700px;">
            <div class="card-body">

                <h2 class="text-center mb-4">
                    Infinity Bank - Simulador de Vendas
                </h2>

                <div class="mb-3">
                    <label class="form-label">Bandeira do Cartão</label>
                    <select id="bandeira" class="form-select">
                        <option value="">Selecione</option>
                        <option value="visa">Visa</option>
                        <option value="master">Mastercard</option>
                        <option value="elo">Elo</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Valor da Venda (R$)</label>
                    <input type="number" id="valor" class="form-control" min="0" step="0.01">
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantidade de Parcelas</label>
                    <input type="number" id="parcelas" class="form-control" min="1" max="24">
                </div>

                <div class="d-grid">
                    <button id="btnCalcular" class="btn btn-primary">
                        Simular Venda
                    </button>
                </div>

                <div id="resultado" class="mt-4"></div>

            </div>
        </div>
    </div>

    <script>

        const botao = document.getElementById("btnCalcular");

        botao.addEventListener("click", function () {

            const bandeira = document.getElementById("bandeira").value;
            const valorVenda = Number(document.getElementById("valor").value);
            const parcelas = Number(document.getElementById("parcelas").value);

            let percentualTaxa = 0;

            switch (bandeira) {

                case "visa":
                    percentualTaxa = 0.02; 
                    break;

                case "master":
                    percentualTaxa = 0.0185; 
                    break;

                case "elo":
                    percentualTaxa = 0.03;
                    break;

                default:
                    alert("Selecione uma bandeira.");
                    return;
            }

            const valorTaxa = valorVenda * percentualTaxa;

            const valorJuros = valorVenda * (0.015 * parcelas);

            const taxaMensal = 12.50 * parcelas;

            const valorTotal =
                valorVenda +
                valorTaxa +
                valorJuros +
                taxaMensal;

            const valorParcela = valorTotal / parcelas;

            document.getElementById("resultado").innerHTML = `
                <div class="alert alert-info">

                    <h4>Resumo da Venda</h4>

                    <hr>

                    <p><strong>Bandeira:</strong> ${bandeira.toUpperCase()}</p>

                    <p><strong>Valor da Venda:</strong>
                    R$ ${valorVenda.toFixed(2)}</p>

                    <p><strong>Taxa da Bandeira:</strong>
                    R$ ${valorTaxa.toFixed(2)}</p>

                    <p><strong>Valor dos Juros:</strong>
                    R$ ${valorJuros.toFixed(2)}</p>

                    <p><strong>Taxa Mensal:</strong>
                    R$ ${taxaMensal.toFixed(2)}</p>

                    <p><strong>Valor Total:</strong>
                    R$ ${valorTotal.toFixed(2)}</p>

                    <p><strong>Valor de Cada Parcela:</strong>
                    R$ ${valorParcela.toFixed(2)}</p>

                </div>
            `;

        });

    </script>

</body>
</html>
