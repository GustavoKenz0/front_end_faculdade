<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de CPF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-body">

                <h2 class="text-center mb-4">Validador de CPF</h2>

                <div class="mb-3">
                    <label for="cpf" class="form-label">Digite o CPF</label>
                    <input type="text" id="cpf" class="form-control" placeholder="Ex: 12345678909">
                </div>

                <div class="d-grid">
                    <button class="btn btn-primary" onclick="validarCPF()">
                        Validar
                    </button>
                </div>

                <div id="resultado" class="mt-4 text-center fw-bold"></div>

            </div>
        </div>
    </div>

    <script>
        function validarCPF() {

            let cpf = document.getElementById("cpf").value;

            cpf = cpf.replace(/\D/g, "");

            const resultado = document.getElementById("resultado");

            if (cpf.length !== 11) {
                resultado.innerHTML = "CPF Inválido!";
                resultado.className = "mt-4 text-center fw-bold text-danger";
                return;
            }

            if (/^(\d)\1+$/.test(cpf)) {
                resultado.innerHTML = "CPF Inválido!";
                resultado.className = "mt-4 text-center fw-bold text-danger";
                return;
            }

            let soma = 0;

            for (let i = 0; i < 9; i++) {
                soma += Number(cpf.charAt(i)) * (10 - i);
            }

            let digito1 = (soma * 10) % 11;

            if (digito1 === 10) {
                digito1 = 0;
            }

            soma = 0;

            for (let i = 0; i < 10; i++) {
                soma += Number(cpf.charAt(i)) * (11 - i);
            }

            let digito2 = (soma * 10) % 11;

            if (digito2 === 10) {
                digito2 = 0;
            }

            if (
                digito1 == cpf.charAt(9) &&
                digito2 == cpf.charAt(10)
            ) {
                resultado.innerHTML = "CPF Válido!";
                resultado.className = "mt-4 text-center fw-bold text-success";
            } else {
                resultado.innerHTML = "CPF Inválido!";
                resultado.className = "mt-4 text-center fw-bold text-danger";
            }
        }
    </script>

</body>
</html>
