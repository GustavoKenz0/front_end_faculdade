<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Bicho</title>
</head>

<body class="h-screen flex flex-col justify-between items-center relative overflow-hidden">

    <h1 id="nomeBicho" class="absolute top-10 text-2xl font-bold text-gray">
        Seu Bichinho
    </h1>

    <div class="flex flex-1 items-center justify-center w-full">
        <img id="bicho"
            class="w-full max-w-md h-auto"
            src="Img_bichinho/bc_normal.jpg" />
    </div>

    <div class="mb-10">
        <img id="btnImage"
            class="w-32 h-auto active:scale-95 transition"
            src="Img_bichinho/btn_bicho.jpg"
            onclick="alimentar()" />
    </div>

    <div class="absolute bottom-4 left-4 flex items-center gap-3">
        <div class="avatar">
            <div class="w-14 rounded-full">
                <img id="avatarImg" src="Img_bichinho/bc_feliz.jpg" />
            </div>
        </div>

        <input id="inputNome"
            type="text"
            placeholder="Nome da criatura..."
            class="input input-secondary" />
    </div>

    <div class="absolute bottom-4 right-4">
        <input id="toggleTema"
            type="checkbox"
            class="toggle" />
    </div>

    <script src="scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body> 

</html>
